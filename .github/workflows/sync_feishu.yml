name: Sync Feishu Doc

on:
  workflow_dispatch:        # 允许手动触发
  schedule:
    - cron: '0 */6 * * *'   # 每6小时自动执行一次

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run sync script
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_WIKI_URL: "https://scnfpjgsylvl.feishu.cn/wiki/CAItwR71aiWTtPkq4hscgk53n9g"
          OUTPUT_FILE: "feishu_doc.md"
        run: python scripts/fetch_feishu_doc.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add feishu_doc.md
          git commit -m "Auto sync Feishu doc" || echo "No changes to commit"
          git push
